<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suporte Ireland</title>
</head>
<body>

  <title>
    Test Navigator
  </title>
  
  <!-- Start of Talkdesk Code -->
  <script>
      var webchat;
      (function(window, document, node, props, configs) {
        if (window.TalkdeskChatSDK) {
          console.error("TalkdeskChatSDK already included");
          return;
        }
        var divContainer = document.createElement("div");
        divContainer.id = node;
        document.body.appendChild(divContainer);
        var src = "https://talkdeskchatsdk.talkdeskapp.com/v2/talkdeskchatsdk.js";
        var script = document.createElement("script");
        var firstScriptTag = document.getElementsByTagName("script")[0];
        script.type = "text/javascript";
        script.charset = "UTF-8";
        script.id = "tdwebchatscript";
        script.src = src;
        script.async = true;
        firstScriptTag.parentNode.insertBefore(script, firstScriptTag);
        script.onload = function() {
          webchat = TalkdeskChatSDK(node, props);
          webchat.init(configs);
          
          /*
           * TRECHO ATIVADO PARA O REINO UNIDO (UK): 
           * Envia a variável "country": "uk" para o Talkdesk Navigator e n8n
           */
           function setContext() {
             webchat.setContextParam({ "country": "uk" });
           }
           
           // Envia o dado quando a conversa é iniciada
           webchat.onConversationStart = function() {
             setContext();
           };
           
           // Envia o dado quando o widget de chat é aberto
           webchat.onOpenWebchat = function() {
             setContext();
           };
        };
      })(
        window,
        document,
        "tdWebchat",
        { 
          touchpointId: "32b4cc585b0244b8a33997d97530a61b", 
          accountId: "641238fb36046f5b1a152af5", /* <-- O seu Account ID real */
          region: "td-eu-1" 
        },
        { enableValidation: false, enableEmoji: true, enableUserInput: true, enableAttachments: true }
      );
    </script>
<!-- End of Talkdesk Code -->

</body>
</html>
