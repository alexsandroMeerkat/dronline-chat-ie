<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suporte</title>
  </head>
  <body>

    <!-- Start of Talkdesk Code -->
    <script>
      var webchat;
      (function (window, document, node, props, configs) {
        if (window.TalkdeskChatSDK) {
          console.error("TalkdeskChatSDK already included");
          return;
        }
        var divContainer = document.createElement("div");
        divContainer.id = node;
        document.body.appendChild(divContainer);
        var src =
          "https://talkdeskchatsdk.talkdeskapp.com/v2/talkdeskchatsdk.js";
        var script = document.createElement("script");
        var firstScriptTag = document.getElementsByTagName("script")[0];
        script.type = "text/javascript";
        script.charset = "UTF-8";
        script.id = "tdwebchatscript";
        script.src = src;
        script.async = true;
        firstScriptTag.parentNode.insertBefore(script, firstScriptTag);
        script.onload = function () {
          webchat = TalkdeskChatSDK(node, props);
          webchat.init(configs);

          // Injeta o país/região em todos os eventos do chat
          function setContext() {
            webchat.setContextParam({
              "country": "ie"
            });
          }

          // Envia ao iniciar a conversa
          webchat.onConversationStart = function () {
            setContext();
          };

          // Envia ao abrir o widget
          webchat.onOpenWebchat = function () {
            setContext();
          };
        };
      })(
        window,
        document,
        "tdWebchat",
        {
          touchpointId: "6caa9cad9a67497890518b54b07ec7a5",
          accountId: "",
          region: "td-eu-1",
        },
        {
          enableValidation: false,
          enableEmoji: true,
          enableUserInput: true,
          enableAttachments: true,
        },
      );
    </script>
    <!-- End of Talkdesk Code -->
  </body>
</html>
